---
- name: Supprimer les anciens fichiers .yaml (remplacés par .yml)
  file:
    path: "/root/compose/{{ item }}"
    state: absent
  loop:
    - suwayomi/docker-compose.yaml
    - seanime/docker-compose.yaml

- name: Créer le réseau Docker proxy
  community.docker.docker_network:
    name: proxy
    state: present

- name: Créer les dossiers de services
  file:
    path: "/root/compose/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - suwayomi
    - seanime
    - docmost
    - portainer
    - n8n
    - stremio

- name: Déployer les compose files statiques
  copy:
    src: "{{ item }}/"
    dest: "/root/compose/{{ item }}/"
  loop:
    - suwayomi
    - portainer
    - docmost
    - n8n
    - stremio

- name: Générer le compose seanime depuis template
  template:
    src: seanime/docker-compose.yml.j2
    dest: /root/compose/seanime/docker-compose.yml
    mode: "0644"

- name: Cloner/mettre à jour le source Nuvio Streams
  ansible.builtin.git:
    repo: https://github.com/tapframe/NuvioStreamsAddon.git
    dest: /root/compose/nuvio
    version: master
    force: true

- name: Déployer l'override compose Nuvio (réseau proxy, pas d'exposition directe)
  copy:
    src: nuvio/docker-compose.override.yml
    dest: /root/compose/nuvio/docker-compose.override.yml

- name: Générer le .env Nuvio depuis template
  template:
    src: nuvio/.env.j2
    dest: /root/compose/nuvio/.env
    mode: "0600"

- name: Générer le .env docmost depuis template
  template:
    src: docmost/.env.j2
    dest: /root/compose/docmost/.env
    mode: "0600"

- name: Générer le .env n8n depuis template
  template:
    src: n8n/.env.j2
    dest: /root/compose/n8n/.env
    mode: "0600"


- name: Supprimer l'ancien container n8n lancé manuellement
  community.docker.docker_container:
    name: n8n
    state: absent
    force_kill: yes

- name: Démarrer les services
  community.docker.docker_compose_v2:
    project_src: "/root/compose/{{ item }}"
    state: present
  loop:
    - suwayomi
    - seanime
    - docmost
    - portainer
    - n8n
    - stremio

- name: Démarrer Nuvio (rebuild si le source a changé)
  community.docker.docker_compose_v2:
    project_src: /root/compose/nuvio
    state: present
    build: always
